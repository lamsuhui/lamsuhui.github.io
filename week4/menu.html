<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Menu</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');
        
        .container{
            max-width: 1700px;
            padding:0 10px;
            display:flex;
            justify-content: space-between;
            margin: 0 40px;
            align-items: center;
        }

        .logo{
            display:flex;
            align-items: center;
        }

        .section{
            display:flex;
            gap:40px;
        }

        h4{
            font-family: 'Oxygen', sans-serif;
            font-size: 18px;
            font-weight: 700;
            line-height: 24px;
        }

        .services{
            color: #f9612b;
        }

        .phone{
            display:flex;
            gap:30px;
            align-items: center;
        }

        .num{
            font-family: 'Oxygen', sans-serif;
            font-size: 18px;
            line-height: 24px;
        }

        .contact{
            display:flex;
            align-items: center;
            justify-content: center;
            background-color: #f9612b;
            border-radius: 14px;
            padding: 0px 30px;
            height: 50px;
            color: white;
 
        }

        .ham{
            display:none;
        }

        @media screen and (max-width: 1450px){  
            .section{
                display:none;
            }
            .contact{
                display:none;
            }
            .ham{
                display:block;
            }
        }

         @media screen and (max-width: 744px){
            .num{
                display:none;
            }
            .call{
                display:none;
            }
        }

    </style>
</head>

<body>
    <div class="container">

        <div class="logo">
            <img src="image/ele.png" width="376" height="73">
        </div>

        <div class="section">
            <h4>Home</h4>
            <h4 class="services">Services</h4>
            <h4>Work</h4>
            <h4>Project Details</h4>
            <h4>Contact</h4>
        </div>

        <div class="phone">
            <img class="call" src="image/phone.png" width="30" height="30">
            <h4 class="num">555-123-4567</h4>
            <h4 class="contact">Contact</h4>
            <img class="ham" src="image/ham.png" width="60" height="50">
        </div>

    </div>
</body>
</html>
