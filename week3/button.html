<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        .request{
           background-color: #000000; 
           color: white; 
           padding: 15px 32px; 
           text-align: center; 
           display: inline-block; 
           font-size: 15px; 
           margin: 4px 2px; 
           cursor: pointer
        }
        .sign{
           background-color: #57a45b; 
           color: white; 
           padding: 15px 32px; 
           text-align: center; 
           border: 2px solid #57a45b; 
           border-radius: 10px; 
           display: inline-block; 
           font-size: 20px; 
           margin: 4px 2px; 
           cursor: pointer;
           font-weight: bold
        }
        .add{
          background-color: #f9da4e; 
          color: black; 
          border: 2px solid #f9da4e; 
          border-radius: 30px; 
          padding: 10px 60px; 
          text-align: center; 
          display: inline-block; 
          font-size: 20px; 
          margin: 4px 2px; 
          cursor: pointer;
          font-weight: bold;
        }
        .get{
          background-color: #7354ad; 
          color: white; 
          padding: 15px 32px; 
          text-align: center; 
          border: 2px solid #7354ad; 
          border-radius: 10px; 
          display: inline-block; 
          font-size: 20px; 
          margin: 4px 2px; 
          cursor: pointer;
          font-weight: bold;
        }
        .download{
          background-color: #ffffff; 
          color: #7c8186;
          border: 2px solid #7c8186;
          border-radius: 5px; 
          padding: 15px 32px; 
          text-align: center; 
          display: inline-block; 
          font-size: 10px; 
          margin: 4px 2px; 
          cursor: pointer;
          font-weight: bold;
        }
        .apply{
          background-color: #3369bc ; 
          color: white; 
          border: 2px solid #3369bc; 
          border-radius: 30px; 
          padding: 15px 32px; 
          text-align: center; 
          display: inline-block; 
          font-size: 20px; 
          margin: 4px 2px; 
          cursor: pointer;
          font-weight: bold;
        }
        .save{
          background-color: #ffffff; 
          color: #3369bc; 
          border: 2px solid #3369bc; 
          border-radius: 30px; 
          padding: 15px 32px; 
          text-align: center; 
          display: inline-block; 
          font-size: 20px; 
          margin: 4px 2px; 
          cursor: pointer;
          font-weight: bold;
        }
    </style>
</head>

<body>
    <button class="request">Request now</button>
    <button class="sign">Sign up</button>
    <button class="add">Add to Cart</button>
    <button class="get">Get started</button>
    <button class="download">Download</button>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
</body>

</html>
