<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display:flex</title>
    <style>
        .container {
            display: flex; /*let the item in same line*/
            background-color: #f992b8;
            padding: 20px;
            margin: 20px;
            gap: 10px; /*space between the item*/
            justify-content: center; /*center the item in the container*/
            align-items: center; /*center the item in the container*/
            height: 100px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div>Item 1</div>
        <div>Item 2</div>
        <div>Item 3</div>
        <div>hellohellohellohellohellohello</div>
    </div>

    <div class="container">
        <div>Item 4</div>
        <div>Item 5</div>
        <div>Item 6</div>
    </div>
</body>
</html>
