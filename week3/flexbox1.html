<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox1</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        
        body{
            background-color: rgb(243, 240, 229);
        }

        h4,
        p{
            margin: 12px;
        }

        p{
            color: rgb(87, 86, 86);
        }

        .container {
            max-width: 1024px;
            padding: 20px;
            display:flex;
            gap:30px;
            margin: 0 auto;
            justify-content:center;
            align-items: center;
        }

        .project{
            background-color: white;
            padding: 15px;
            border-radius: 5%;
        }

        h4{
            font-family: "Roboto",sans-serif;
            font-size: 23px; 
        }

        p{
            font-family: "Oxygen",sans-serif;
            font-weight: 30px;
            font-size: 13px;
            line-height: 25px;
        }

        img{
            border-radius: 5%;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="project">
            <img src="image/1.jpg" width="100%">
            <h4>Residential projects</h4>
            <p>We build sustainable and modern homes for comfortable living.
            </p>
        </div>

        <div class="project">
            <img src="image/2.jpg" width="100%">
            <h4>Commercial spaces</h4>
            <p>We create efficient, inspiring workspaces for businesses of all sizes.
            </p>
        </div>

        <div class="project">
            <img src="image/3.jpg" width="100%">
            <h4>Infrastructure works</h4>
            <p>We develop strong, reliable infrastructure for growing communities.
            </p>
        </div>

    </div>

</body>
</html>
