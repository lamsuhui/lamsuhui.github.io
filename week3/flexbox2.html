<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        .container2 {
            max-width: 1440px;
            max-height: 863px;
            padding: 10px 10px;
            display:flex;
            justify-content: space-between;
            margin: 0 auto;
            gap:80px;
        }

        .request{
            background-color:#F3F3F3;
            font-family: "Space Grotesk",sans-serif;
            color:#191A23;
            border: 2px solid #191A23; 
            border-radius: 15px; 
            padding: 15px 30px; 
            text-align: center; 
            display: inline-block; 
            font-size: 15px; 
            margin: 4px 2px; 
        }

        .container {
            max-width: 1440px;
            max-height: 863px;
            padding: 100px 10px;
            display:flex;
            margin: 0 auto;
            gap:200px;
            justify-content:space-between;
            align-items:center;
        }

        .describe{
            width: 531px;
            height:481px
        }

        .book{
            background-color: #191A23;
            font-family: "Space Grotesk",sans-serif;
            color: #F3F3F3;
            border: 2px solid #191A23; 
            border-radius: 15px; 
            padding: 15px 30px; 
            text-align: center; 
            display: inline-block; 
            font-size: 15px; 
            margin: 4px 2px; 
        }

        h1,
        p{
            color: #191A23;
            font-family: "Space Grotesk",sans-serif;
        }

        h1{
            font-size: 60px;
            font-weight: 500;

        }

        .img{
            width: 600.46px;
            height: 515px;
        }

        .company{
            height: 48px;
            padding: 10px 10px;
            display: flex;
            justify-content: space-between;
            margin: 0px 115.667px ;
            gap:20px;
        }

    </style>
</head>

<body>

   <div class="container2">

        <div class="logo">
            <img src="image/logo.jpg" width="100%">
        </div>

        <div class="button">
            <button>About Us</button>
            <button>Services</button>
            <button>Use Cases</button>
            <button>Pricing</button>
            <button>Blog</button>
            <button class="request">Request a quote</button>
        </div>
    
    </div>

    <div class="container">

        <div class="describe">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of service include SEO, PPC, social media marketing, and content creation.</p>
            <button class="book">Book a consultation</button>
        </div>

        <div class="img">
            <img src="image/pic1.jpg" width="100%">
        </div>

    </div>

    <div class="company">

        <img src="image/amz.jpg" width="124.11px">
        <img src="image/dribble.jpg" width="126.37px">
        <img src="image/hub.jpg" width="128.63px">
        <img src="image/notion.jpg" width="145.55px">
        <img src="image/ntf.jpg" width="125.24px">
        <img src="image/zoom.jpg" width="110.57px">

    </div>

</body>

</html>
