<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox2</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap');

        .container2 {
            max-width: 1440px;
            max-height: 863px;
            padding: 30px 10px;
            display:flex;
            justify-content: space-between;
            margin: 0 auto;
            gap:40px;
            align-items: center;
        }

        .header{
            display: flex;
            align-items: center;
            gap:50px;
            justify-content: space-between;
        }

        a {
            font-family: "Space Grotesk",sans-serif;
            text-decoration: none;
            color: #191A23;
            font-size: 20px;
            font-weight: 400;
            line-height: 28px;
        }

        .request{
            background-color: white;
            font-family: "Space Grotesk",sans-serif;
            color:#191A23;
            border: 1px solid #191A23; 
            border-radius: 14px; 
            padding: 20px 35px; 
            text-align: center; 
            display: inline-block; 
            font-size: 20px; 
            line-height: 28px;
            margin: 4px 2px; 
        }

        .container {
            max-width: 1440px;
            max-height: 863px;
            padding: 50px 100px;
            display:flex;
            margin: 0 auto;
            gap:370px;
            justify-content:space-between;
            align-items:center;
        }

        .describe{
            max-width: 50%;
            gap: 35px;
        }

        h1,
        p{
            color: #191A23;
            font-family: "Space Grotesk",sans-serif;
        }

        h1{
            font-size: 60px;
            font-weight: 500;
            line-height: 120%;
        }

        p{
            font-weight: 400;
            font-size: 20px;
            line-height: 28px;
        }

        .book{
            background-color: #191A23;
            font-family: "Space Grotesk",sans-serif;
            color: #F3F3F3;
            border: 1px solid #191A23; 
            border-radius: 14px; 
            padding: 20px 35px; 
            text-align: center; 
            display: inline-block; 
            font-size: 19px; 
            font-weight: 400;
            line-height: 28px;
            margin: 4px 2px; 
            max-width: 264px;
            max-height: 68px;
        }

        .img{
            max-width: 600.46px;
            max-height: 515px;
        }

        .company{
            height: 48px;
            padding: 40px 10px;
            display: flex;
            justify-content: space-between;
            margin: 0px 115.667px ;
            gap:20px;
        }

    </style>

</head>

<body>

   <div class="container2">

        <div class="logo">
            <img src="image/logo.jpg" width="100%">
        </div>

        <div class="header">
            <a href="#">About Us</a>
            <a href="#">Services</a>
            <a href="#">Use Cases</a>
            <a href="#">Pricing</a>
            <a href="#">Blog</a>
            <button class="request">Request a quote</button>  
        </div>
    
    </div>

    <div class="container">

        <div class="describe">
            <h1>Navigating the digital landscape for success</h1>
            <p>Our digital marketing agency helps businesses grow and succeed online through a range of service include SEO, PPC, social media marketing, and content creation.</p>
            <button class="book">Book a consultation</button>
        </div>

        <div class="img">
            <img src="image/pic1.jpg" width="100%">
        </div>

    </div>

    <div class="company">
        <div><img src="image/amz.jpg" width="100%"></div>
        <div><img src="image/dribble.jpg" width="100%"></div>
        <div><img src="image/hub.jpg" width="100%"></div>
        <div><img src="image/notion.jpg" width="100%"></div>
        <div><img src="image/ntf.jpg" width="100%"></div>
        <div><img src="image/zoom.jpg" width="100%"></div>
    </div>

</body>
</html>
