<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divdivdiv</title>

    <style>
        .spacing{
            padding: 20px;
            margin: 20px;
        }
        .hello{
            background-color: #f992b8;
        }

        .bye{
            background-color: #561e36;   
        }
    </style>
</head>

<body>
    <div class="hello spacing">
        <p>Hello, World!</p>
        <h1>This is a heading</h1>
    </div>

    <div class="bye spacing">
        <p>Bye, World!</p>
        <h1>This is a heading</h1>
    </div>

</body>
</html>
