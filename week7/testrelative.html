<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div.relative.relative{
            position: relative; /* important ! if not then the world will not any change */
            left:20%;
            bottom:20px; /* 120 px then can let the word pop up */
            border: 3px solid #737373;
        }
    </style>
</head>
<body>

    <h1>Using position: relative</h1>

    <p>Hello Hello Hello Hello Hello wawawawawawawawawawa yeahhhhhhhhhhhhhhhhhhhhhhhhhhyeahhhhhhhhhhhhhhhhhhhhhhhhh good morning</p>
    
    <div class="relative">
        This div element has position: relative
    </div>
</body>
</html>
