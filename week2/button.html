<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>

<body>
    <button style="background-color: #000000; color: white; padding: 15px 32px; text-align: center; display: inline-block; font-size: 15px; margin: 4px 2px; cursor: pointer;">Request now</button>
    
    <button style="background-color: #57a45b; color: white; padding: 15px 32px; text-align: center; border: 2px solid #57a45b; border-radius: 10px; display: inline-block; font-size: 20px; margin: 4px 2px; cursor: pointer;font-weight: bold;">Sign up</button>

    <button style="background-color: #f9da4e; color: black; border: 2px solid #f9da4e; border-radius: 30px; padding: 10px 60px; text-align: center; display: inline-block; font-size: 20px; margin: 4px 2px; cursor: pointer;font-weight: bold;">Add to Cart</button>

    <button style="background-color: #7354ad; color: white; padding: 15px 32px; text-align: center; border: 2px solid #7354ad; border-radius: 10px; display: inline-block; font-size: 20px; margin: 4px 2px; cursor: pointer;font-weight: bold;">Get started</button>
    
    <button style="background-color: #ffffff; color: #7c8186;border: 2px solid #7c8186;border-radius: 5px; padding: 15px 32px; text-align: center; display: inline-block; font-size: 10px; margin: 4px 2px; cursor: pointer;font-weight: bold;">Download</button>

    <button style="background-color: #3369bc ; color: white; border: 2px solid #3369bc; border-radius: 30px; padding: 15px 32px; text-align: center; display: inline-block; font-size: 20px; margin: 4px 2px; cursor: pointer;font-weight: bold;">Apply on company website</button>

    <button style="background-color: #ffffff; color: #3369bc; border: 2px solid #3369bc; border-radius: 30px; padding: 15px 32px; text-align: center; display: inline-block; font-size: 20px; margin: 4px 2px; cursor: pointer;font-weight: bold;">Save</button>
</body>

</html>
